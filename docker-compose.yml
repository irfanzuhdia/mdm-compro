services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mdm_compro
      POSTGRES_USER: mdm
      POSTGRES_PASSWORD: mdm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/migrations/001_init.up.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdm -d mdm_compro"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./Backend
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      FRONTEND_ORIGINS: http://localhost:3000,http://localhost:8088
      DATABASE_URL: postgres://mdm:mdm@postgres:5432/mdm_compro?sslmode=disable
      JWT_SECRET: change-me-in-production
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: mdm-media
      S3_USE_SSL: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./FrontEnd
    environment:
      CMS_API_BASE_URL: http://api:8080/api/v1/public
      NEXT_PUBLIC_CMS_API_BASE_URL: http://localhost:8088/api/v1/public
      NEXTAUTH_URL: http://localhost:8088
      AUTH_URL: http://localhost:8088
      NEXT_PUBLIC_SITE_URL: http://localhost:8088
      CMS_COOKIE_SECURE: "false"
    ports:
      - "3000:3000"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "8088:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api

volumes:
  postgres_data:
  minio_data:
